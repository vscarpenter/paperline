<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paperline — Sign In Example</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../dist/paperline.css" />

<style>
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    background:
      radial-gradient(80% 60% at 100% 0%, var(--pl-accent-50) 0%, transparent 60%),
      radial-gradient(60% 60% at 0% 100%, var(--pl-paper-2) 0%, transparent 60%),
      var(--pl-paper-0);
    color: var(--pl-ink-1);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr;
  }

  .stage {
    display: grid; place-items: center;
    padding: 48px 20px; min-height: 100vh; box-sizing: border-box;
  }

  .frame { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: stretch; }

  .brand-row { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 36px; }
  .brand-name { font-family: var(--pl-font-serif); font-size: 18px; color: var(--pl-ink-1); letter-spacing: -0.01em; }

  .card {
    background: var(--pl-paper-card);
    border: 1px solid var(--pl-hairline-strong);
    border-radius: 16px;
    box-shadow: var(--pl-shadow-lg);
    padding: 36px 32px 28px;
  }

  .heading { text-align: center; margin-bottom: 28px; }
  .heading .eyebrow { font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--pl-accent-500); font-weight: 600; margin-bottom: 10px; }
  .heading h1 { font-family: var(--pl-font-serif); font-size: 32px; font-weight: 400; letter-spacing: -0.02em; color: var(--pl-ink-1); margin: 0 0 6px; line-height: 1.1; }
  .heading h1 em { font-style: italic; color: var(--pl-accent-500); }
  .heading p { font-size: 13.5px; color: var(--pl-ink-3); margin: 0; line-height: 1.55; }

  .oauth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }

  .or-row { display: flex; align-items: center; gap: 12px; margin: 4px 0 16px; }
  .or-row .line { flex: 1; height: 1px; background: var(--pl-hairline); }
  .or-row .word { font-family: var(--pl-font-mono); font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--pl-ink-4); }

  .password-row {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    margin-bottom: 6px;
  }
  .password-row label {
    font-family: var(--pl-font-sans); font-size: 12px; font-weight: 600;
    color: var(--pl-ink-2);
  }
  .forgot { font-size: 11.5px; color: var(--pl-accent-500); text-decoration: none; font-weight: 500; }
  .forgot:hover { color: var(--pl-accent-700); }

  .below-card { text-align: center; margin-top: 22px; font-size: 13px; color: var(--pl-ink-3); }
  .below-card a { color: var(--pl-accent-500); text-decoration: none; font-weight: 600; }
  .below-card a:hover { color: var(--pl-accent-700); }

  .legal { text-align: center; margin-top: 24px; font-size: 11px; color: var(--pl-ink-5); line-height: 1.5; }
  .legal a { color: var(--pl-ink-3); text-decoration: none; }

  .home-link { position: absolute; top: 20px; left: 20px; font-family: var(--pl-font-mono); font-size: 11px; color: var(--pl-ink-4); text-decoration: none; padding: 6px 10px; border-radius: 999px; border: 1px solid var(--pl-hairline); background: var(--pl-paper-card); }
  .home-link:hover { color: var(--pl-ink-1); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body class="pl-root">
<a href="../index.html" class="home-link">← All examples</a>
<div id="root"></div>

<script type="text/babel" src="../dist/paperline-icons.global.jsx"></script>
<script type="text/babel" src="../dist/paperline-components.global.jsx"></script>

<script type="text/babel">
const { useState } = React;

const GoogleMark = ({ size = 16, ...props }) => (
  <svg width={size} height={size} viewBox="0 0 48 48" {...props}>
    <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
    <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
    <path fill="#FBBC05" d="M11.69 28.18c-.44-1.32-.69-2.73-.69-4.18s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/>
    <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
  </svg>
);

const GitHubMark = ({ size = 16, ...props }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" {...props}>
    <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56 0-.27-.01-1.16-.02-2.1-3.2.7-3.87-1.37-3.87-1.37-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.24 3.34.95.1-.74.4-1.24.73-1.53-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.28 1.18-3.09-.12-.29-.51-1.45.11-3.02 0 0 .96-.31 3.15 1.18.91-.25 1.89-.38 2.86-.39.97.01 1.95.14 2.86.39 2.19-1.49 3.15-1.18 3.15-1.18.62 1.57.23 2.73.11 3.02.74.81 1.18 1.83 1.18 3.09 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.06.78 2.13 0 1.54-.01 2.78-.01 3.16 0 .31.21.67.79.55C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/>
  </svg>
);

const App = () => {
  const [email, setEmail] = useState("");
  const [pass, setPass]   = useState("");
  const [stay, setStay]   = useState(true);
  const [err, setErr]     = useState(null);
  const [busy, setBusy]   = useState(false);

  const valid = email.includes("@") && pass.length >= 6;

  const onSubmit = (e) => {
    e.preventDefault();
    if (!valid) return;
    setBusy(true); setErr(null);
    setTimeout(() => {
      setBusy(false);
      setErr("That email and password don't match an account. Try again or reset your password.");
    }, 800);
  };

  return (
    <div className="stage">
      <div className="frame">
        <div className="brand-row">
          <I.Logo size={22} />
          <span className="brand-name">Paperline</span>
        </div>

        <div className="card">
          <div className="heading">
            <div className="eyebrow">Welcome back</div>
            <h1>Sign in to <em>your studio.</em></h1>
            <p>Use your work email — we'll send a magic link if you'd rather skip the password.</p>
          </div>

          <div className="oauth-row">
            <PLButton kind="secondary" icon={GoogleMark}>Google</PLButton>
            <PLButton kind="secondary" icon={GitHubMark}>GitHub</PLButton>
          </div>

          <div className="or-row">
            <div className="line" />
            <span className="word">Or with email</span>
            <div className="line" />
          </div>

          <form onSubmit={onSubmit}>
            <PLStack gap={14}>
              <PLField label="Work email" required>
                <PLInput
                  type="email" autoComplete="email"
                  value={email} onChange={e => setEmail(e.target.value)}
                  placeholder="you@studio.com" icon={I.Inbox}
                />
              </PLField>

              <div>
                <div className="password-row">
                  <label>Password</label>
                  <a className="forgot" href="#">Forgot password?</a>
                </div>
                <PLInput
                  type="password" autoComplete="current-password"
                  value={pass} onChange={e => setPass(e.target.value)}
                  placeholder="••••••••" icon={I.Shield}
                />
              </div>

              {err && (
                <PLAlert tone="danger" title="Couldn't sign in">{err}</PLAlert>
              )}

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                <PLToggle checked={stay} onChange={() => setStay(v => !v)} label="Stay signed in" />
              </div>

              <PLButton
                kind="primary"
                type="submit"
                fullWidth
                iconRight={busy ? null : I.ChevRight}
                disabled={!valid || busy}
              >
                {busy ? "Signing in…" : "Sign in"}
              </PLButton>
            </PLStack>
          </form>
        </div>

        <div className="below-card">
          New here? <a href="../index.html">Create an account</a>
        </div>

        <div className="legal">
          By signing in you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
