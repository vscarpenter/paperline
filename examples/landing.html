<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paperline — Marketing Landing Example</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../dist/paperline.css" />

<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--pl-paper-0); color: var(--pl-ink-1); }

  .page { max-width: 1180px; margin: 0 auto; padding: 28px 24px 96px; }

  /* Nav */
  .nav { display: flex; align-items: center; gap: 24px; padding: 10px 16px; border-radius: 999px; background: var(--pl-paper-card); border: 1px solid var(--pl-hairline); box-shadow: var(--pl-shadow-xs); }
  .nav-brand { display: inline-flex; align-items: center; gap: 8px; font-family: var(--pl-font-serif); font-size: 18px; color: var(--pl-ink-1); letter-spacing: -0.01em; }
  .nav-brand-mark { width: 26px; height: 26px; border-radius: 6px; background: var(--pl-ink-1); color: var(--pl-paper-card); display: grid; place-items: center; }
  .nav-links { display: flex; gap: 18px; margin-left: 8px; }
  .nav-links a { font-size: 13px; color: var(--pl-ink-3); text-decoration: none; }
  .nav-links a:hover { color: var(--pl-ink-1); }
  .nav-cta { margin-left: auto; display: flex; gap: 8px; }

  /* Hero */
  .hero { padding: 96px 0 64px; }
  .hero .eyebrow { font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--pl-accent-500); font-weight: 600; margin-bottom: 18px; }
  .hero h1 {
    font-family: var(--pl-font-serif); font-weight: 400;
    font-size: clamp(44px, 7vw, 88px); line-height: 0.98; letter-spacing: -0.035em;
    margin: 0 0 24px; max-width: 960px; color: var(--pl-ink-1);
  }
  .hero h1 em { color: var(--pl-accent-500); font-style: italic; }
  .hero p.lede { font-size: 19px; line-height: 1.55; color: var(--pl-ink-2); max-width: 640px; margin: 0 0 32px; }
  .hero .ctas { display: flex; gap: 10px; flex-wrap: wrap; }

  /* Quoted authority strip */
  .marquee {
    display: flex; gap: 56px; padding: 28px 0;
    border-top: 1px solid var(--pl-hairline); border-bottom: 1px solid var(--pl-hairline);
    margin: 56px 0 80px;
    color: var(--pl-ink-4);
    font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    flex-wrap: wrap; justify-content: space-between;
  }
  .marquee span { font-weight: 500; }

  /* Sections */
  section { padding: 56px 0; }
  .section-head { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; margin-bottom: 48px; }
  .section-head .eyebrow { font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--pl-accent-500); font-weight: 600; }
  .section-head h2 { font-family: var(--pl-font-serif); font-size: clamp(32px, 4.4vw, 48px); font-weight: 400; letter-spacing: -0.02em; color: var(--pl-ink-1); margin: 0; max-width: 720px; }
  .section-head h2 em { color: var(--pl-accent-500); font-style: italic; }
  .section-head p { font-size: 15.5px; line-height: 1.55; color: var(--pl-ink-3); max-width: 560px; margin: 0; }

  /* Feature grid */
  .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .feature { background: var(--pl-paper-card); border: 1px solid var(--pl-hairline); border-radius: 14px; padding: 22px; }
  .feature .icon-pad { width: 36px; height: 36px; border-radius: 8px; background: var(--pl-accent-50); border: 1px solid var(--pl-accent-200); color: var(--pl-accent-500); display: grid; place-items: center; margin-bottom: 14px; }
  .feature h3 { font-family: var(--pl-font-serif); font-size: 20px; font-weight: 400; letter-spacing: -0.01em; color: var(--pl-ink-1); margin: 0 0 8px; }
  .feature p { font-size: 13.5px; line-height: 1.55; color: var(--pl-ink-3); margin: 0; }

  /* Pricing */
  .pricing { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; max-width: 980px; margin: 0 auto; }
  .price-card { background: var(--pl-paper-card); border: 1px solid var(--pl-hairline-strong); border-radius: 16px; padding: 28px 24px; display: flex; flex-direction: column; gap: 18px; transition: transform var(--pl-dur-1), box-shadow var(--pl-dur-1); }
  .price-card.featured { border-color: var(--pl-accent-500); box-shadow: var(--pl-shadow-lg); }
  .price-card .tier-row { display: flex; align-items: center; justify-content: space-between; }
  .price-card .tier { font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--pl-ink-3); font-weight: 600; }
  .price-card .amount { font-family: var(--pl-font-serif); font-size: 56px; line-height: 1; letter-spacing: -0.03em; color: var(--pl-ink-1); }
  .price-card .amount span { font-family: var(--pl-font-mono); font-size: 14px; color: var(--pl-ink-4); margin-left: 6px; letter-spacing: 0; }
  .price-card .desc { font-size: 13.5px; line-height: 1.55; color: var(--pl-ink-3); margin: 0; }
  .price-feats { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .price-feats li { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--pl-ink-2); }
  .price-feats svg { color: var(--pl-ok-500); flex-shrink: 0; }

  /* Quote */
  .quote-wrap { max-width: 820px; margin: 0 auto; text-align: center; }
  .quote-wrap blockquote {
    font-family: var(--pl-font-serif); font-style: italic;
    font-size: clamp(26px, 3.4vw, 38px); line-height: 1.25; letter-spacing: -0.015em;
    color: var(--pl-ink-1); margin: 0 0 28px;
  }
  .quote-wrap blockquote::before { content: "\201C"; color: var(--pl-accent-500); }
  .quote-wrap blockquote::after { content: "\201D"; color: var(--pl-accent-500); }
  .quote-meta { display: inline-flex; align-items: center; gap: 12px; }
  .quote-avatar { width: 40px; height: 40px; border-radius: 999px; background: var(--pl-accent-100); color: var(--pl-accent-700); display: grid; place-items: center; font-family: var(--pl-font-serif); font-size: 16px; }
  .quote-name { font-size: 13.5px; color: var(--pl-ink-1); font-weight: 600; }
  .quote-role { font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--pl-ink-4); }

  /* Final CTA */
  .final {
    background: var(--pl-ink-1); color: var(--pl-paper-card);
    border-radius: 24px; padding: 64px 32px; text-align: center;
    margin-top: 56px;
  }
  .final h2 { font-family: var(--pl-font-serif); font-size: clamp(32px, 4.4vw, 52px); font-weight: 400; letter-spacing: -0.025em; margin: 0 0 16px; color: var(--pl-paper-card); }
  .final h2 em { color: var(--pl-accent-300); font-style: italic; }
  .final p { font-size: 15.5px; line-height: 1.55; max-width: 480px; margin: 0 auto 28px; color: var(--pl-paper-3); opacity: 0.85; }

  /* Footer */
  footer.site-footer {
    margin-top: 56px; padding: 32px 4px 0;
    border-top: 1px solid var(--pl-hairline);
    display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    font-size: 12px; color: var(--pl-ink-4);
  }
  footer.site-footer a { color: var(--pl-ink-3); text-decoration: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body class="pl-root">
<div id="root"></div>

<script type="text/babel" src="../dist/paperline-icons.global.jsx"></script>
<script type="text/babel" src="../dist/paperline-components.global.jsx"></script>

<script type="text/babel">
const App = () => {
  const features = [
    { icon: I.Sparkles, title: "Considered tokens",  body: "70+ CSS variables for ink, paper, accent, status, type, spacing, radius, motion, and z-index. One source of truth." },
    { icon: I.Layers,   title: "Composable components", body: "31 React primitives — buttons, fields, tables, modals, menus — built on the tokens. No CSS-in-JS, no runtime cost." },
    { icon: I.Book,     title: "Editorial typography", body: "A serif for every heading, a system sans for body, mono for metadata. Tri-modal by design." },
    { icon: I.Shield,   title: "Accessible by default", body: "Real focus rings, hidden inputs for toggle/checkbox/radio, ARIA labelling, and reduced-motion support." },
    { icon: I.Sprout,   title: "Static-first",       body: "Drop in three files and a stylesheet. No bundler, no build step. Works in any framework — or none at all." },
    { icon: I.Moon,     title: "Light & dark twin",  body: "Every token has a light and dark value. Toggle with a single class — no class soup, no rebuilds." },
  ];

  const tiers = [
    {
      tier: "Starter",
      price: "$0",
      per: "/forever",
      desc: "Open source. Take everything, ship it.",
      featured: false,
      feats: ["MIT license", "All 31 components", "All 38 icons", "Light & dark themes"],
      cta: { kind: "secondary", label: "Clone the repo", icon: I.Download },
    },
    {
      tier: "Studio",
      price: "$24",
      per: "/mo",
      desc: "For teams shipping production UI.",
      featured: true,
      badge: "Most popular",
      feats: ["Everything in Starter", "Figma source files", "Brand-color generator", "Email support"],
      cta: { kind: "primary", label: "Start free trial", icon: I.Rocket },
    },
    {
      tier: "Atelier",
      price: "$96",
      per: "/mo",
      desc: "For studios building bespoke systems.",
      featured: false,
      feats: ["Everything in Studio", "White-label tokens", "Custom serif pairing", "Quarterly review"],
      cta: { kind: "secondary", label: "Contact sales", icon: I.Megaphone },
    },
  ];

  return (
    <div className="page">

      {/* Nav */}
      <nav className="nav">
        <span className="nav-brand">
          <span className="nav-brand-mark"><I.Logo size={14} /></span>
          Paperline
        </span>
        <div className="nav-links">
          <a href="#features">Features</a>
          <a href="#pricing">Pricing</a>
          <a href="../docs/index.html">Spec</a>
          <a href="../index.html">Examples</a>
        </div>
        <div className="nav-cta">
          <PLButton kind="ghost" size="sm">Sign in</PLButton>
          <PLButton kind="primary" size="sm" iconRight={I.ChevRight}>Start free</PLButton>
        </div>
      </nav>

      {/* Hero */}
      <section className="hero">
        <div className="eyebrow">v1.0 · Out today</div>
        <h1>Calmer software, built on <em>warm paper.</em></h1>
        <p className="lede">
          Paperline is the editorial design system for product teams who'd rather their app feel like a well-set page than a candy-colored dashboard. Tokens, components, and icons — opinionated, considered, free.
        </p>
        <div className="ctas">
          <PLButton kind="primary" iconRight={I.ChevRight}>Read the spec</PLButton>
          <PLButton kind="secondary" icon={I.Download}>Download v1.0</PLButton>
        </div>
      </section>

      {/* Marquee */}
      <div className="marquee">
        <span>Used by Folio</span>
        <span>Quill &amp; Co.</span>
        <span>Marginalia</span>
        <span>Inkwell</span>
        <span>Letterform Studio</span>
        <span>Paperback</span>
      </div>

      {/* Features */}
      <section id="features">
        <div className="section-head">
          <span className="eyebrow">Inside the system</span>
          <h2>Six things that make Paperline <em>feel different.</em></h2>
          <p>The system is small on purpose. Every token earns its place; every component does one job well.</p>
        </div>
        <div className="features">
          {features.map(f => (
            <div key={f.title} className="feature">
              <div className="icon-pad"><f.icon size={18} /></div>
              <h3>{f.title}</h3>
              <p>{f.body}</p>
            </div>
          ))}
        </div>
      </section>

      {/* Pricing */}
      <section id="pricing">
        <div className="section-head">
          <span className="eyebrow">Pricing</span>
          <h2>Free forever. Or <em>elevate</em> when you're ready.</h2>
          <p>Paperline itself is MIT-licensed. The paid tiers are for teams who want Figma sources and direct support.</p>
        </div>
        <div className="pricing">
          {tiers.map(t => (
            <div key={t.tier} className={`price-card${t.featured ? " featured" : ""}`}>
              <div className="tier-row">
                <span className="tier">{t.tier}</span>
                {t.badge && <PLBadge tone="accent">{t.badge}</PLBadge>}
              </div>
              <div>
                <div className="amount">{t.price}<span>{t.per}</span></div>
                <p className="desc" style={{ marginTop: 8 }}>{t.desc}</p>
              </div>
              <PLDivider />
              <ul className="price-feats">
                {t.feats.map(f => (
                  <li key={f}><I.Check size={14} />{f}</li>
                ))}
              </ul>
              <PLButton kind={t.cta.kind} icon={t.cta.icon} fullWidth>{t.cta.label}</PLButton>
            </div>
          ))}
        </div>
      </section>

      {/* Quote */}
      <section>
        <div className="quote-wrap">
          <blockquote>
            We replaced a sprawling Material clone with Paperline in an afternoon. The product immediately felt like ours — a publication, not a console.
          </blockquote>
          <div className="quote-meta">
            <div className="quote-avatar">M</div>
            <div style={{ textAlign: "left" }}>
              <div className="quote-name">Maya Tanaka</div>
              <div className="quote-role">Design Lead · Marginalia</div>
            </div>
          </div>
        </div>
      </section>

      {/* Final CTA */}
      <section style={{ padding: 0 }}>
        <div className="final">
          <h2>Quieter UI, <em>shipped today.</em></h2>
          <p>One stylesheet, one icon set, thirty-one components. No build configuration, no runtime, no opinions about your framework.</p>
          <div style={{ display: "inline-flex", gap: 10 }}>
            <PLButton kind="primary" iconRight={I.ChevRight}>Read the spec</PLButton>
            <PLButton kind="ghost" icon={I.Share}>Share Paperline</PLButton>
          </div>
        </div>
      </section>

      <footer className="site-footer">
        <span>© 2026 Paperline · MIT licensed</span>
        <span>
          <a href="../index.html">Examples</a> · <a href="../docs/index.html">Spec</a> · <a href="https://github.com/vscarpenter/paperline">GitHub</a>
        </span>
      </footer>

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
